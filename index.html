var GUA_NUM={1:'坎',2:'坤',3:'震',4:'巽',5:'坤',6:'乾',7:'兑',8:'艮',9:'离',10:'坤',15:'坤',20:'坤',25:'坤'};

function yearHua(g){

             '丙':'天同禄 天机权 文昌科 廉贞忌','丁':'太阴禄 天同权 天机科 巨门忌',

             '庚':'太阳禄 武曲权 太阴科 天同忌','辛':'巨门禄 太阳权 文曲科 文昌忌',

  var line=m[g]||'';var r={'禄':'','权':'','科':'','忌':''};
  if(!line)return r;
  line.split(' ').forEach(function(p){
    if(p.slice(-1)==='禄')r.禄=p.slice(0,-1);
    if(p.slice(-1)==='权')r.权=p.slice(0,-1);
    if(p.slice(-1)==='科')r.科=p.slice(0,-1);
    if(p.slice(-1)==='忌')r.忌=p.slice(0,-1);
  });
  return r;
}

function calcXian(bazi){
  var t=GAN_NUM[bazi[0]||'甲']+GAN_NUM[bazi[2]||'丙']+GAN_NUM[bazi[4]||'戊']+GAN_NUM[bazi[6]||'庚'];

  var dg=d<=25?GUA_NUM[d%10||10]:GUA_NUM[d%25||25];
  return {t:t,d:d,tianGua:tg,diGua:dg,tRemain:t<=25?t:t%25||25,dRemain:d<=25?d:d%25||25};
}

// ========== 解析引擎 ==========
function parseChart(text){
  showDebug('开始解析...');
  var res={};

  // 基本信息
  res.gender = text.indexOf('性别 : 男')>=0?'男':text.indexOf('性别 : 女')>=0?'女':'未知';
  res.wuxing = (text.match(/五行局数[：: ]*([^\n]+)/)||['','水二局'])[1].trim();
  res.mingZhu = (text.match(/命主[：: ]*([^\n;；]+)/)||['','廉贞'])[1].trim();
  res.shenZhu = (text.match(/身主[：: ]*([^\n;；]+)/)||['','天同'])[1].trim();
  res.douJun = (text.match(/子年斗君[：: ]*([^\n;；]+)/)||['',''])[1].trim();
  var shengGongMatch = text.match(/身宫[：: ]*([^\n;；]+)/);
  res.shenGong = shengGongMatch ? shengGongMatch[1].replace(/身宫[：:]/g,'').trim() : '申';

  // 四柱：优先从"节气四柱"或"非节气四柱"行提取
  var siZhu = text.match(/[^\n]*四柱[：: ]*([^\n]+)/);
  if(siZhu){
    var parts = siZhu[1].trim().split(/[\s　]+/);
    if(parts.length >= 4){
      res.bazi = [parts[0], parts[1], parts[2], parts[3]];
    }
  }
  if(!res.bazi || res.bazi.length < 4){
    res.bazi = [];
    var ym = text.match(/年柱[：: ]*([甲乙丙丁戊己庚辛壬癸][子丑寅卯辰巳午未申酉戌亥])/);
    var mm = text.match(/月柱[：: ]*([甲乙丙丁戊己庚辛壬癸][子丑寅卯辰巳午未申酉戌亥])/);
    var dm = text.match(/日柱[：: ]*([甲乙丙丁戊己庚辛壬癸][子丑寅卯辰巳午未申酉戌亥])/);
    var hm = text.match(/时柱[：: ]*([甲乙丙丁戊己庚辛壬癸][子丑寅卯辰巳午未申酉戌亥])/);
    if(ym)res.bazi.push(ym[1]); if(mm)res.bazi.push(mm[1]);
    if(dm)res.bazi.push(dm[1]); if(hm)res.bazi.push(hm[1]);
  }
  if(!res.bazi) res.bazi=['甲','子','丙','寅','戊','午','庚','辰'];

  // 十二宫
  res.palaces=[];
  var gongList=['财帛','子女','夫妻','兄弟','命  宫','父母','福德','田宅','官禄','交友','迁移','疾厄'];
  var nameMap={'财帛':'财帛','子女':'子女','夫妻':'夫妻','兄弟':'兄弟','命  宫':'命宫','父母':'父母','福德':'福德','田宅':'田宅','官禄':'官禄','交友':'交友','迁移':'迁移','疾厄':'疾厄'};
  var remaining=text;
  gongList.forEach(function(gname){
    var idx=remaining.indexOf(gname);
    if(idx<0)return;
    var ni=-1;
    var gIdx=gongList.indexOf(gname);
    for(var j=gIdx+1;j<gongList.length;j++){
      var found=remaining.indexOf(gongList[j],idx+1);
      if(found>0 && (ni<0||found<ni))ni=found;
    }
    var block=ni>0?remaining.substring(idx,ni):remaining.substring(idx);
    remaining=ni>0?remaining.substring(ni):'';

    // 地支
    var zm=block.match(/\[([甲乙丙丁戊己庚辛壬癸])([子丑寅卯辰巳午未申酉戌亥])\]/);
    var tg=zm?zm[1]:'';
    var dz=zm?zm[2]:'';

    // 主星
    var msMatch=block.match(/主星[：: ]*([^\n]+)/);
    var msText=msMatch?msMatch[1].trim():'';
    var stars=[];
    var shengHua=[];
    var ziHua=[];
    MAIN_STARS.forEach(function(s){
      if(msText.indexOf(s)>=0)stars.push(s);
    });
    if(msText.indexOf('生年禄')>=0)shengHua.push('生年禄');
    if(msText.indexOf('生年权')>=0)shengHua.push('生年权');
    if(msText.indexOf('生年科')>=0)shengHua.push('生年科');
    if(msText.indexOf('生年忌')>=0)shengHua.push('生年忌');
    if(msText.indexOf('↓'))ziHua.push('离心自化');
    if(msText.indexOf('↑'))ziHua.push('向心自化');
    var isShenGong=block.indexOf('身宫')>=0;
    var isLaiYin=block.indexOf('来因')>=0;

    // 辅星
    var auxMatch=block.match(/辅星[：: ]*([^\n]+)/);
    var aux=auxMatch?auxMatch[1].trim():'';
    var sm2=block.match(/小星[：: ]*([^\n]+)/);
    var small=sm2?sm2[1].trim():'';
    var dxm=block.match(/大限[：: ]*([^\n]+)/);
    var dx=dxm?dxm[1].trim():'';

    var realName=nameMap[gname]||gname;
    res.palaces.push({
      name:realName,tg:tg,dz:dz,stars:stars,
      msText:msText.replace(/\[.*?\]/g,'').trim(),
      aux:aux,small:small,
      shengHua:shengHua,ziHua:ziHua,
      isShenGong:isShenGong,isLaiYin:isLaiYin,daXian:dx
    });
  });

  showDebug('解析完成：'+res.palaces.length+'个宫位，四柱：'+res.bazi.join(''));
  return res;
}

function safeAnalyze(){

    showDebug('开始分析...');

    var c=parseChart(text);
    renderBasic(c);
    renderXian(c);

    renderHua(c);

    renderSummary(c);
    var ids=['outBasic','outXian','outGong','outHua','outDaXian','outSummary'];
    ids.forEach(function(id){document.getElementById(id).classList.add('active');});
    showStatus('分析完成！');

  }
}

function renderDaXian(c){
  var allGongs=['命宫','兄弟','夫妻','子女','财帛','疾厄','迁移','交友','官禄','田宅','福德','父母'];
  var list=allGongs.map(function(g){return c.palaces.find(function(p){return p.name===g;});}).filter(function(p){return p&&p.daXian;}).slice(0,8);
  var h='';
  h+='<b>以下按宫位顺序列出前8个大限的流年关键事件推演：</b>\n\n';

  list.forEach(function(p,idx){
    var m=p.daXian.match(/(\d+)~(\d+)虚岁/);
    if(!m)return;
    var sa=parseInt(m[1]),ea=parseInt(m[2]);
    h+='<b>【第'+(idx+1)+'大限 · '+p.name+' · '+sa+'~'+ea+'虚岁】</b>\n';
    h+='主星：'+(p.msText||'—')+'\n';
    h+='格局：'+(TRAITS[p.name]||GONGZHI[p.name]||'—')+'\n';

    // 生年四化叠入
    var yg=c.bazi[0];
    var hua=yearHua(yg);
    var hTypes=[];
    if(p.stars.indexOf(hua.禄)>=0)hTypes.push('禄');
    if(p.stars.indexOf(hua.权)>=0)hTypes.push('权');
    if(p.stars.indexOf(hua.科)>=0)hTypes.push('科');
    if(p.stars.indexOf(hua.忌)>=0)hTypes.push('忌');
    if(hTypes.length){
      h+='<b class="good">生年四化叠入：'+hTypes.join('、')+'</b>\n';
    }

    // 流年推演
    var lm=p.daXian.match(/流年[：: ]*([^\n]+)/);
    if(lm){
      var yrs=lm[1].match(/\d+/g);
      if(yrs){
        var keyYrs=yrs.filter(function(yr){
          var a=parseInt(yr);
          return a%5===0||[7,8,9].indexOf(a%10)>=0;
        });
        if(keyYrs.length){
          h+='<b>关键流年：</b>';
          keyYrs.forEach(function(yr){
            var a=parseInt(yr);
            var desc=getYearDesc(a,p.name,c);
            h+='<span class="good">'+a+'虚岁</span>('+desc+') ';
          });
          h+='\n';
        }
      }
    }
    h+='\n';
    if(idx<list.length-1)h+='<hr>\n';
  });
  document.getElementById('daXianRes').innerHTML=h;
}

function getYearDesc(age,gong,c){
  var d=[];
  var p=c.palaces.find(function(p){return p.name===gong;});
  var hua=yearHua(c.bazi[0]);
  var hs=[];
  if(p) p.stars.forEach(function(s){if(s===hua.禄)hs.push('禄');if(s===hua.权)hs.push('权');if(s===hua.科)hs.push('科');if(s===hua.忌)hs.push('忌');});

  if(gong==='疾厄'&&[27,28,29,39,40,41,51,52,53].indexOf(age)>=0)d.push('健康波动');
  if(gong==='迁移'&&[26,27,38,39,50,51].indexOf(age)>=0)d.push('出外变动');
  if(gong==='官禄'&&[24,36,48].indexOf(age)>=0)d.push('事业关键');
  if(gong==='财帛'&&[28,40,52].indexOf(age)>=0)d.push('财运波动');
  if(gong==='夫妻'&&[26,30,32,38,42,44].indexOf(age)>=0)d.push('感情波动');
  if(gong==='福德'&&age%12===0)d.push('精神转折');
  if(hs.indexOf('忌')>=0)d.push('防忌星扰');
  if(hs.indexOf('禄')>=0)d.push('财运亨通');
  if(hs.indexOf('权')>=0)d.push('权势提升');
  if(hs.indexOf('科')>=0)d.push('声名远播');
  if(d.length===0)d.push('平稳过渡');
  return d.join('；');
}
